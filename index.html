<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Frontend Pro</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<main>
    <div class="slider">
        <div class="slide">
            <div class="prev">
                <button data-status="first">Prev</button>
            </div>

            <div class="image">
                <img src="./images/img_1.jpeg" alt="Image">
            </div>

            <div class="next">
                <button data-status="last">Next</button>
            </div>
        </div>

        <div class="dots">
            <div class="dot active-dot"></div>
        </div>
    </div>
</main>

<script src="./script.js"></script>
</body>
</html>
