<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Frontend Pro</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<main>
    <div class="input_container">
        <input type="text" class="task_input" placeholder="Add new task">
        <button class="add_button">Add</button>
        <button class="remove_button">Remove</button>
        <button class="cancel" style="display: none">Cancel</button>
        <div class="warning">Task cannot be empty</div>
    </div>
    <div class="tasks_container"></div>
</main>

<script src="./script.js"></script>
</body>
</html>
